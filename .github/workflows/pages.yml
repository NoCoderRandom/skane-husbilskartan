name: Deploy Skåne husbilskarta

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "20 * * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Rebuild place data
        run: npm run build:data
        env:
          FORCE_REFRESH_OSM: ${{ (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && '1' || '' }}
      - name: Audit place data
        run: npm run audit:data
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Smoke test live page
        run: npm run smoke:live -- --url "$PAGE_URL" --retries 5 --retry-delay-ms 12000
        env:
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
